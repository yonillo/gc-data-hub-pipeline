name: GC Fuel Data Pipeline

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

# 🔑 ESTO ES VITAL: Permite a la Action escribir en tu repositorio
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v4 # Actualizado a v4

    - name: Configurar Python
      uses: actions/setup-python@v5 # Actualizado a v5
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar Pipeline ETL
      run: python src/main.py

    - name: Commitear y subir cambios
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/*.parquet
        # Solo hacemos commit si hay cambios reales para evitar el Error 1
        git diff --quiet && git diff --staged --quiet || (git commit -m "📊 Update fuel data: $(date +'%Y-%m-%d')" && git push)
