name: GC Fuel Data Pipeline

on:
  schedule:
    # Se ejecuta todos los días a las 08:00 AM UTC
    - cron: '0 8 * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente desde GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout del repositorio
      uses: actions/checkout@v3

    - name: Configurar Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar Pipeline ETL
      run: python src/main.py

    - name: Commitear y subir cambios
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/*.parquet
        git commit -m "📊 Update fuel data: $(date +'%Y-%m-%d')" || echo "No changes to commit"
        git push